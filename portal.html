<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>westendhotel – Rezeption</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #F5F3EF;
      color: #3B4547;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .logo-area {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo-area img {
      height: 44px;
      margin-bottom: 12px;
    }

    .logo-area h1 {
      font-family: 'DM Sans', sans-serif;
      font-size: 22px;
      font-weight: 600;
      color: #3B4547;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .logo-area p {
      font-size: 13px;
      color: #7A7F80;
      margin-top: 4px;
    }

    .cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      max-width: 620px;
      width: 100%;
      padding: 0 24px;
    }

    .card {
      background: #fff;
      border: 1px solid #E0DDD6;
      border-radius: 12px;
      padding: 32px 28px;
      text-decoration: none;
      color: inherit;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      cursor: pointer;
    }

    .card:hover {
      border-color: #2a6b7c;
      box-shadow: 0 8px 30px rgba(42,107,124,0.12);
      transform: translateY(-2px);
    }

    .card .icon {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 16px;
    }

    .card.angebot .icon { background: rgba(201,152,58,0.12); }
    .card.payment .icon { background: rgba(42,107,124,0.1); }

    .card h2 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .card p {
      font-size: 13px;
      color: #7A7F80;
      line-height: 1.5;
    }

    .footer {
      margin-top: 48px;
      font-size: 11px;
      color: #bbb;
      text-align: center;
    }

    @media (max-width: 500px) {
      .cards { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="logo-area">
    <img src="wh-logo_weiss_transparent.png" alt="westendhotel"
         style="height:44px;background:#3B4547;padding:10px 18px;border-radius:8px;">
    <h1>Rezeption</h1>
    <p>Internes Toolportal</p>
  </div>

  <div class="cards">
    <a class="card angebot" href="index.html">
      <div class="icon">✉️</div>
      <h2>Angebotstool</h2>
      <p>Angebote & Buchungs­bestätigungen erstellen und per E-Mail versenden</p>
    </a>

    <a class="card payment" href="moto.html">
      <div class="icon">💳</div>
      <h2>Payment Dashboard</h2>
      <p>Kreditkarten verwalten, MOTO-Eingabe, CC-Links versenden, Belastungen</p>
    </a>
  </div>

  <div class="footer">
    westendhotel nürnberg · MORE Hospitality GmbH
  </div>

</body>
</html>
